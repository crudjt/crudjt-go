name: Run autotest on multiple OS and architectures

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        include:
          # - os: macos-latest
          #   arch: aarch64
          #   target: aarch64-apple-darwin
          # - os: windows-latest
          #   arch: x86_64
          #   target: x86_64-pc-windows-msvc
          # - os: ubuntu-latest
          #   arch: x86_64
          #   target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21' # або інша потрібна версія

      - name: Run Go program
        working-directory: ./autotests
        run: go run .
